name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_call:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
      - run: cargo check --features mcp

  msrv:
    name: MSRV (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      # Cargo.toml pins rust-version = "1.88"; this job guards against a
      # transitive dep bump silently raising the real MSRV (M7). The floor
      # is driven by darling 0.23 / icu 2.2 / instability 0.3 — those are
      # pulled in transitively via rmcp / ratatui and need >= 1.88.
      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          toolchain: "1.88"
      - run: cargo check --features mcp

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
      - run: cargo test --features mcp

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          components: clippy
      - run: cargo clippy --features mcp -- -D warnings

  deny:
    name: Deny (advisories, licenses, bans, sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: EmbarkStudios/cargo-deny-action@3fd3802e88374d3fe9159b834c7714ec57d6c979 # v2.0.15
        with:
          command: check advisories licenses bans sources

  coverage:
    name: Coverage (llvm-cov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@0c7a94999971db56e9df89df226240aab222e776 # v2
        with:
          tool: cargo-llvm-cov
      - name: Generate lcov report
        run: |
          cargo llvm-cov --features mcp \
            --workspace \
            --lcov --output-path lcov.info \
            --ignore-filename-regex '(tests/|target/)'
      - name: Print coverage summary
        run: |
          cargo llvm-cov report \
            --ignore-filename-regex '(tests/|target/)' \
            --summary-only | tee coverage-summary.txt
      - name: Upload lcov artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: lcov
          path: lcov.info
          if-no-files-found: error
      - name: Upload summary artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-summary
          path: coverage-summary.txt
          if-no-files-found: error
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@0565863a31f2c772f9f0395002a31e3f06189574 # v5.5.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          # M10: don't fail CI when Codecov upload flakes or the token is
          # unavailable (e.g. on fork PRs). Coverage is a reporting signal,
          # not a correctness gate.
          fail_ci_if_error: false

  e2e-js-providers:
    name: E2E JS Provider Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      # L10: align with the pinned toolchain action used by every other job.
      # setup-rust-toolchain bundles rust-cache so the explicit Swatinem step
      # is no longer needed.
      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Yarn Classic
        run: npm install -g yarn@1

      - name: Enable Corepack (for Yarn Berry)
        run: corepack enable

      - name: Run E2E tests
        run: cargo test --features e2e --test e2e_js_providers -- --test-threads=1

  e2e-jvm-providers:
    name: E2E JVM Provider Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Maven and Gradle
        run: sudo apt-get update && sudo apt-get install -y maven gradle

      - name: Run JVM E2E tests
        run: cargo test --features e2e --test e2e_jvm_providers -- --test-threads=1
